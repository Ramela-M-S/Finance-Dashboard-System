{% extends "base.html" %}

{% block content %}

<div class="admin-panel">

     <h3 class="text-center mb-5">🧑‍💼 Admin Panel</h3>


    <div class="grid-container">

        <a href="/admin/users" class="menu-card">
            <div class="icon-circle">👥</div>
            <h5>User Management</h5>
            <p>Manage users, roles & access</p>
        </a>

        <a href="/admin/records" class="menu-card">
            <div class="icon-circle">💰</div>
            <h5>Financial Records</h5>
            <p>Create & manage transactions</p>
        </a>

        <a href="/admin/insights" class="menu-card">
            <div class="icon-circle">📊</div>
            <h5>Dashboard & Insights</h5>
            <p>View analytics and summaries</p>
        </a>

        <a href="/admin/filter" class="menu-card">
            <div class="icon-circle">🔍</div>
            <h5>Filtering & Search</h5>
            <p>Advanced data filtering</p>
        </a>

    </div>
</div>

<style>
    /* Grid layout - default 4 cards in one row */
.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 cards in one row on large screens */
    gap: 30px;
}

/* Medium screens (tablet/laptop) - 2x2 */
@media (max-width: 1200px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr); /* 2 cards per row */
    }
}

/* Small screens (phones) - stack vertically */
@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr; /* 1 card per row */
    }
}
/* Admin Panel Container */
.admin-panel {
    max-width: 1400px;
    margin: 40px auto;
    padding: 0 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Title */
.admin-panel h3 {
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    color: #0b1f3a;
    margin-bottom: 60px;
}

/* Grid layout - all 4 cards visible on large screens */
.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 cards in one row */
    gap: 30px;
}

@media (max-width: 1200px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr); /* 2 up, 2 down on smaller desktops */
    }
}

@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr; /* stack on tablets and mobiles */
    }
}

/* Menu cards */
.menu-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e6f2ff, #ffffff);
    padding: 30px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: #0b1f3a;
    box-shadow: 0 12px 25px rgba(0,0,0,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    text-align: center;
    min-height: 220px; /* shorter height */
}

/* Icon Circle */
.menu-card .icon-circle {
    width: 80px;
    height: 80px;
    background: #4facfe;
    color: white;
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Card Text */
.menu-card h5 {
    margin: 10px 0 8px;
    font-weight: 700;
    font-size: 20px;
}
.menu-card p {
    font-size: 14px;
    color: #555;
}

/* Hover Effects */
.menu-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 16px 35px rgba(0,0,0,0.15);
    background: linear-gradient(135deg, #d0e7ff, #ffffff);
}
.menu-card:hover .icon-circle {
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* Responsive tweaks */
@media (max-width: 768px) {
    .menu-card {
        padding: 25px 15px;
    }
    .menu-card .icon-circle {
        width: 70px;
        height: 70px;
        font-size: 30px;
    }
    .menu-card h5 {
        font-size: 18px;
    }
    .menu-card p {
        font-size: 13px;
    }
}

@media (max-width: 480px) {
    .menu-card {
        padding: 20px 10px;
    }
    .menu-card .icon-circle {
        width: 60px;
        height: 60px;
        font-size: 26px;
    }
    .menu-card h5 {
        font-size: 16px;
    }
    .menu-card p {
        font-size: 12px;
    }
}
</style>

{% endblock %}
