<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

<style>
/* ===== Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #F0F9FF, #E0F2FE);
    color: #0F172A;
    display: flex;
    flex-direction: column;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
main {
    flex: 1;
    display: block;
    flex-direction: column;
    justify-content: flex-start; /* IMPORTANT */
    align-items: stretch; /* IMPORTANT */
    padding: 20px 5%;
}
/* ===== Navbar ===== */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #E2E8F0;
}

.logo {
    color: #3B82F6;
    font-size: 1.5rem;
    font-weight: bold;
}

/* Desktop Nav */
.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links li a {
    text-decoration: none;
    color: #334155;
    font-weight: 500;
    position: relative;
}

/* Hover underline */
.nav-links li a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #3B82F6;
    left: 0;
    bottom: -4px;
    transition: 0.3s;
}

.nav-links li a:hover::after {
    width: 100%;
}

/* Hamburger */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* ===== Mobile Menu ===== */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 900;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

@media (max-width: 768px) {

    .menu-toggle {
        display: block;
        z-index: 1100;
    }

    .nav-links {
        position: fixed;
        top: 0;
        right: -100%;
        height: 100vh;
        width: 70%;
        background: white;
        flex-direction: column;
        align-items: center;
        padding-top: 80px;
        gap: 25px;
        transition: 0.4s ease;
        z-index: 1000;
        box-shadow: -5px 0 15px rgba(0,0,0,0.1);
    }

    .nav-links.active {
        right: 0;
    }
}

/* ===== Card ===== */
.center-container {
    width: 100%;
    max-width: 500px;
    margin: auto;
}

.card {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 20px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 12px 25px rgba(0,0,0,0.12);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.icon-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #3B82F6;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    margin: 0 auto 25px;
}

.card h1 {
    font-size: 1.8rem;
    color: #1E3A8A;
    margin-bottom: 10px;
}

.card p {
    color: #475569;
    margin-bottom: 20px;
}

/* Buttons */
.btn-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}

.btn {
    width: 100%;
    max-width: 220px;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: 0.3s;
}

.btn-primary {
    background: #3B82F6;
    color: white;
}

.btn-primary:hover {
    background: #2563EB;
}

.btn-secondary {
    background: #DBEAFE;
    color: #1E40AF;
}

.btn-secondary:hover {
    background: #93C5FD;
}

/* ===== Footer ===== */
.footer {
    margin-top: auto;
    background-color: #F8FAFC;
    border-top: 1px solid #E2E8F0;
    padding: 15px 5%;
}

.footer-content {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
}

.footer-content ul {
    display: flex;
    gap: 15px;
    list-style: none;
}

.footer-content a {
    text-decoration: none;
    color: #3B82F6;
}

/* ===== Small Devices ===== */
@media (max-width: 480px) {

    main {
        padding: 20px 10px;
    }

    .card {
        padding: 20px 10px;
    }

    .icon-circle {
        width: 70px;
        height: 70px;
        font-size: 35px;
    }

    .btn {
        max-width: 160px;
        font-size: 0.9rem;
    }

    .footer-content {
        flex-direction: column;
        text-align: center;
        align-items: center;
    }

}
body {
    border: 5px solid red;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <h2 class="logo">Finance Dashboard</h2>

    <ul class="nav-links" id="navLinks">
        <li><a href="{{ url_for('admin_insights') }}">Dashboard</a></li>
        <li><a href="{{ url_for('admin_users') }}">User Management</a></li>
        <li><a href="{{ url_for('add_record') }}">Financial Records</a></li>
        <li><a href="{{ url_for('admin_filter') }}">Search</a></li>
    </ul>

    <div class="menu-toggle" id="menuToggle">
        <i class="bi bi-list"></i>
    </div>
</nav>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Main -->
<main>
    <div class="center-container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <p>&copy; 2026 Finance Dashboard System</p>
        <ul>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Support</a></li>
        </ul>
    </div>
</footer>

<!-- JS -->
<script>
const toggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");
const overlay = document.getElementById("overlay");

toggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
    overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
    navLinks.classList.remove("active");
    overlay.classList.remove("active");
});
</script>

</body>
</html>
