<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
<style>
  /* ===== Base Styles ===== */
  html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #F0F9FF, #E0F2FE);
      color: #0F172A;
      display: flex;
      flex-direction: column;
  }

  main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 5%;
  }

  /* ===== Navbar ===== */
  .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background-color: #fff;
      border-bottom: 1px solid #E2E8F0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .logo { color: #3B82F6; font-size: 1.5rem; font-weight: bold; }
  .nav-links { list-style: none; display: flex; gap: 20px; }
  .nav-links li a { text-decoration: none; color: #334155; font-weight: 500; transition: 0.3s; }
  .nav-links li a:hover { color: #3B82F6; }
  .menu-toggle { display: none; font-size: 28px; cursor: pointer; }

  /* ===== Card ===== */
  .center-container { width: 100%; display: flex; justify-content: center; align-items: center; }
  .card {
      width: 100%;
      max-width: 500px;
      min-height: 450px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.12);
      text-align: center;
      padding: 40px 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 16px 35px rgba(0,0,0,0.18); }
  .icon-circle {
      width: 100px; height: 100px;
      border-radius: 50%; background: #3B82F6;
      color: white; display: flex; justify-content: center; align-items: center;
      font-size: 50px; margin: 0 auto 25px auto; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
  }
  .icon-circle:hover { transform: scale(1.1); }
  .card h1 { font-size: 1.8rem; color: #1E3A8A; margin-bottom: 15px; }
  .card p { font-size: 1rem; color: #475569; margin-bottom: 25px; }
  .btn-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }
  .btn { width: 100%; max-width: 220px; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: none; }
  .btn-primary { background: #3B82F6; color: #fff; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }
  .btn-primary:hover { background: #2563EB; transform: translateY(-2px); box-shadow: 0 6px 14px rgba(59,130,246,0.4); }
  .btn-secondary { background: #DBEAFE; border: 1px solid #3B82F6; color: #1E40AF; }
  .btn-secondary:hover { background: #93C5FD; transform: translateY(-2px); box-shadow: 0 6px 14px rgba(59,130,246,0.3); }

  /* ===== Footer ===== */
  .footer {
      background-color: #F8FAFC;
      border-top: 1px solid #E2E8F0;
      padding: 15px 5%;
      color: #64748B;
      font-size: 14px;
  }
  .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
  }
  .footer-content ul {
      display: flex;
      list-style: none;
      gap: 15px;
      margin: 0;
      padding: 0;
  }
  .footer-content ul li a {
      color: #3B82F6; text-decoration: none;
  }
  .footer-content ul li a:hover { text-decoration: underline; }

  /* ===== Responsive ===== */
  @media(max-width:768px){
      .menu-toggle { display: block; }

      /* Mobile Menu Slide */
      .nav-links {
          position: absolute;
          top: 65px;
          right: 0;
          width: 100%;
          flex-direction: column;
          background: #fff;
          max-height: 0;
          overflow: hidden;
          gap: 15px;
          padding: 0 0;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
          transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
          opacity: 0;
      }
      .nav-links.active {
          max-height: 500px;
          padding: 20px 0;
          opacity: 1;
      }

      .card { padding: 30px 15px; min-height: 400px; }
      .icon-circle { width: 80px; height: 80px; font-size: 40px; margin-bottom: 20px; }
      .btn { max-width: 180px; padding: 10px; font-size: 0.9rem; }
      .footer-content { flex-direction: column; gap: 10px; text-align: center; }
  }
  @media(max-width:480px){
      .card { padding: 25px 10px; min-height: 350px; }
      .icon-circle { width: 70px; height: 70px; font-size: 35px; }
      .btn { max-width: 160px; padding: 8px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <h2 class="logo">Finance Dashboard</h2>
    <ul class="nav-links" id="navLinks">
        <li><a href="{{ url_for('admin_insights') }}">Dashboard</a></li>
        <li><a href="{{ url_for('admin_users') }}">User Management</a></li>
        <li><a href="{{ url_for('add_record') }}">Financial Records</a></li>
        <li><a href="{{ url_for('admin_filter') }}">Search</a></li>
    </ul>
    <div class="menu-toggle" id="menuToggle">&#9776;</div>
</nav>

<!-- Main Content -->
<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <p>&copy; 2026 Finance Dashboard System</p>
        <ul>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Terms of Service</a></li>
            <li><a href="#">Support</a></li>
        </ul>
    </div>
</footer>

<script>
    const toggle = document.getElementById("menuToggle");
    const navLinks = document.getElementById("navLinks");
    toggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
    });
</script>

</body>
</html>
