{% extends "base.html" %}

{% block content %}

<div class="edit-container">

    <div class="edit-card">

        <h3 class="title">✏️ Edit Record</h3>

        <form method="POST">

            <div class="form-grid">

                <!-- Amount -->
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" step="0.01" name="amount"
                        value="{{ record.amount }}" required>
                </div>
<br>
                <!-- Type -->
                <div class="form-group">
                    <label>Type</label>
                    <select name="type" required>
                        <option value="income" {% if record.type == 'income' %}selected{% endif %}>Income</option>
                        <option value="expense" {% if record.type == 'expense' %}selected{% endif %}>Expense</option>
                    </select>
                </div>
<br>
                <!-- Category -->
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category"
                        value="{{ record.category }}">
                </div>
<br>
                <!-- Date -->
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date"
                        value="{{ record.date.strftime('%Y-%m-%d') }}" required>
                </div>

            </div>
                <br>
            <!-- Notes -->
            <div class="form-group mt-3">
                <label>Notes</label>
                <textarea name="notes">{{ record.notes }}</textarea>
            </div>
            <br>
            <br>
            <!-- Buttons -->
            <div class="btn-group mt-4">
                <button type="submit" class="btn-save">💾 Update</button>
                <a href="{{ url_for('view_record') }}" class="btn-cancel">Cancel</a>
            </div>

        </form>

    </div>

</div>

<style>


.edit-container {
    min-height: 100vh;
    background: linear-gradient(to right, #eef2ff, #f8fbff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.edit-card {
    background: white;
    padding: 30px;
    border-radius: 18px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.edit-card:hover {
    transform: translateY(-3px);
}


.title {
    text-align: center;
    font-weight: 700;
    color: #4facfe;
    margin-bottom: 25px;
}


.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}


.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #333;
}


input, select, textarea {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d0e2ff;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
    border-color: #4facfe;
    box-shadow: 0 0 6px rgba(79,172,254,0.4);
}


textarea {
    min-height: 80px;
    resize: none;
}


.btn-group {
    display: flex;
    justify-content: space-between;
}

.btn-save {
    background: #4facfe;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-save:hover {
    background: #3a9eee;
}

.btn-cancel {
    text-decoration: none;
    background: #6c757d;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.btn-cancel:hover {
    background: #5a6268;
}


@media (max-width: 600px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}

</style>

{% endblock %}
